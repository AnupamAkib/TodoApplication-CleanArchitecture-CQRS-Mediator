services:
  postgres-database:
    image: postgres:16.4
    container_name: postgres-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - shared_network

  webapi:
    container_name: TodoApp-api
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - API__ConnectionStrings__DatabaseConnection=Host=postgres-database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      - postgres-database
    ports:
      - "5000:8080"
      - "5001:8081"
    networks:
      - shared_network

  frontend:  
    container_name: TodoApp-frontend
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      - ENV_KEY=${ENV_VALUE}
    depends_on:
      - webapi
    ports:
      - "3000:3000"
    networks:
      - shared_network

volumes:
  pgadmin_data:
    driver: local
  postgres_data:
    driver: local

networks:
  shared_network:
    driver: bridge
